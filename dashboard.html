<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>🌿 МІЙ УЛЮБЛЕНИЙ ДІМ — Панель керування</title>
<link rel="stylesheet" href="dashboard.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.4/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h1>🌿 МІЙ УЛЮБЛЕНИЙ ДІМ</h1>

<div class="status-bar">
  <span><span class="dot" id="dot"></span><span id="connText">Підключення...</span></span>
  <span style="display:flex;gap:12px;align-items:center;">
    <span id="lastUpdate">--:--:--</span>
    <button onclick="logout()" style="background:transparent;border:1px solid #1e2d40;color:#4a6a8a;font-family:'Share Tech Mono',monospace;font-size:10px;padding:3px 8px;border-radius:5px;cursor:pointer;">ВИЙТИ</button>
  </span>
</div>

<!-- Датчики -->
<div class="card">
  <div class="card-title">📊 Показники</div>
  <div class="sensors">
    <div><div class="sv" id="sTemp">--</div><div class="sl">Темп. °C</div></div>
    <div><div class="sv" id="sHum">--</div><div class="sl">Волог. %</div></div>
    <div><div class="sv" id="sTime" style="font-size:16px;padding-top:6px">--:--</div><div class="sl">Час</div></div>
    <div>
      <div class="power-indicator on" id="powerIndicator">⚡ ON</div>
      <div class="sl">220В</div>
    </div>
  </div>
</div>

<!-- Реле -->
<div class="card">
  <div class="card-title">⚡ Реле</div>
  <div id="relayList"></div>
</div>

<!-- Параметри -->
<div class="card">
  <div class="card-title">⚙️ Параметри автоматики</div>
  <div class="form-row">
    <label>🌍 Часовий пояс</label>
    <div class="toggle-wrap">
      <span class="toggle-label winter">Зима UTC+2</span>
      <label class="toggle">
        <input type="checkbox" id="pSummer" onchange="onParamFocus()">
        <span class="toggle-slider"></span>
      </label>
      <span class="toggle-label summer">Літо UTC+3</span>
    </div>
  </div>
  <div class="form-row"><label>💡 Світло від (год)</label><input type="number" id="pLightOn" min="0" max="23" onfocus="onParamFocus()" onblur="onParamBlur()"></div>
  <div class="form-row"><label>🌙 Світло до (год)</label><input type="number" id="pLightOff" min="0" max="23" onfocus="onParamFocus()" onblur="onParamBlur()"></div>
  <div class="form-row"><label>💧 Мін. вологість % (зволож.)</label><input type="number" id="pHumMin" min="0" max="100" onfocus="onParamFocus()" onblur="onParamBlur()"></div>
  <div class="form-row"><label>🌡 Макс. температура °C (вент.)</label><input type="number" id="pFanT" min="0" max="60" step="0.5" onfocus="onParamFocus()" onblur="onParamBlur()"></div>
  <div class="form-row"><label>💨 Макс. вологість % (вент.)</label><input type="number" id="pFanH" min="0" max="100" onfocus="onParamFocus()" onblur="onParamBlur()"></div>
  <div class="form-row"><label>Вентилятор реагує на температуру</label><input type="checkbox" id="pFanByT" onchange="onParamFocus()"></div>
  <div class="form-row"><label>Вентилятор реагує на вологість</label><input type="checkbox" id="pFanByH" onchange="onParamFocus()"></div>
  <button class="save-btn" onclick="saveParams()">💾 ЗБЕРЕГТИ ПАРАМЕТРИ</button>
</div>

<!-- Графік відключень -->
<div class="card">
  <div class="card-title">📉 Відключення світла (24 год)</div>
  <div class="timeline-labels" id="timelineLabels"></div>
  <div class="timeline" id="timeline"></div>
  <div id="outageList"><div class="no-outages">Завантаження...</div></div>
</div>

<div class="toast" id="toast"></div>

<script src="auth.js"></script>
<script src="app.js"></script>
</body>
</html>
