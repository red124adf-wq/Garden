<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>🌿 МІЙ ДІМ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.4/mqtt.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap');
:root{
  --bg:#0a0e1a;--panel:#111827;--border:#1e2d40;
  --green:#00ff88;--cyan:#00f0ff;--red:#ff4444;--yellow:#ffd700;--orange:#ff8800;
  --text:#c8d8e8;--dim:#4a6a8a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);font-family:'Exo 2',sans-serif;color:var(--text);
  padding:12px;min-height:100vh;
  background-image:
    radial-gradient(ellipse at 10% 10%,#00ff8811 0%,transparent 50%),
    radial-gradient(ellipse at 90% 90%,#00f0ff11 0%,transparent 50%);
}
h1{font-family:'Share Tech Mono',monospace;color:var(--cyan);text-shadow:0 0 12px var(--cyan);
  font-size:22px;letter-spacing:4px;text-align:center;padding:14px 0 6px;}
.status-bar{display:flex;justify-content:space-between;align-items:center;
  font-size:11px;color:var(--dim);font-family:'Share Tech Mono',monospace;padding:4px 0 12px;}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);
  margin-right:5px;transition:all .3s;}
.dot.ok{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.card{background:var(--panel);border:1px solid var(--border);border-radius:16px;
  padding:16px;margin-bottom:12px;}
.card-title{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;
  color:var(--dim);margin-bottom:14px;text-transform:uppercase;}

/* Датчики */
.sensors{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;text-align:center;}
.sv{font-family:'Share Tech Mono',monospace;font-size:24px;color:var(--cyan);text-shadow:0 0 8px var(--cyan);}
.sl{font-size:11px;color:var(--dim);margin-top:4px;}
.power-indicator{font-family:'Share Tech Mono',monospace;font-size:18px;padding-top:4px;}
.power-indicator.on{color:var(--green);text-shadow:0 0 8px var(--green);}
.power-indicator.off{color:var(--red);text-shadow:0 0 8px var(--red);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Реле */
.relay-row{display:flex;align-items:center;justify-content:space-between;
  padding:11px 0;border-bottom:1px solid var(--border);}
.relay-row:last-child{border-bottom:none;}
.relay-left{display:flex;align-items:center;gap:8px;}
.relay-name{font-size:14px;font-weight:600;}
.relay-state{font-family:'Share Tech Mono',monospace;font-size:11px;padding:2px 7px;border-radius:4px;}
.relay-state.on{color:var(--green);border:1px solid var(--green);}
.relay-state.off{color:var(--dim);border:1px solid var(--border);}
.relay-controls{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
.badge{font-size:10px;padding:2px 7px;border-radius:4px;font-family:'Share Tech Mono',monospace;
  cursor:pointer;transition:all .2s;}
.badge.auto{background:#00ff8822;color:var(--green);border:1px solid var(--green);}
.badge.manual{background:#ffd70022;color:var(--yellow);border:1px solid var(--yellow);}
.btn{padding:5px 11px;border-radius:7px;border:1px solid var(--border);background:transparent;
  color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;}
.btn:hover{border-color:var(--cyan);color:var(--cyan);}
.btn.on-btn{border-color:var(--green);color:var(--green);}
.btn.off-btn{border-color:var(--red);color:var(--red);}

/* Параметри */
.form-row{display:flex;align-items:center;justify-content:space-between;
  padding:9px 0;border-bottom:1px solid var(--border);}
.form-row:last-child{border-bottom:none;}
.form-row label{font-size:13px;color:var(--text);flex:1;}
.form-row input[type=number]{width:72px;background:#080c14;border:1px solid var(--border);
  color:var(--cyan);font-family:'Share Tech Mono',monospace;font-size:14px;
  padding:4px 8px;border-radius:6px;text-align:center;outline:none;}
.form-row input[type=number]:focus{border-color:var(--cyan);}
.form-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--cyan);cursor:pointer;}

/* Перемикач літо/зима */
.toggle-wrap{display:flex;align-items:center;gap:10px;}
.toggle{position:relative;width:52px;height:26px;cursor:pointer;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:13px;transition:.3s;}
.toggle-slider:before{content:"";position:absolute;width:20px;height:20px;left:3px;top:3px;
  background:var(--dim);border-radius:50%;transition:.3s;}
.toggle input:checked + .toggle-slider{background:#1e3a5f;border:1px solid var(--cyan);}
.toggle input:checked + .toggle-slider:before{transform:translateX(26px);background:var(--cyan);}
.toggle-label{font-family:'Share Tech Mono',monospace;font-size:13px;}
.toggle-label.summer{color:var(--yellow);}
.toggle-label.winter{color:var(--cyan);}

.save-btn{width:100%;padding:13px;margin-top:14px;border-radius:10px;
  border:1px solid var(--cyan);background:transparent;color:var(--cyan);
  font-family:'Share Tech Mono',monospace;font-size:14px;letter-spacing:2px;
  cursor:pointer;transition:all .2s;}
.save-btn:hover{background:#00f0ff22;box-shadow:0 0 16px #00f0ff44;}

/* Графік відключень */
.timeline{position:relative;height:40px;background:#080c14;border-radius:8px;
  overflow:hidden;margin:12px 0 8px;}
.timeline-bar{position:absolute;height:100%;transition:all .3s;}
.timeline-bar.power-on{background:#00ff8822;border-right:1px solid var(--green);}
.timeline-bar.power-off{background:#ff444433;border-right:1px solid var(--red);}
.timeline-labels{display:flex;justify-content:space-between;font-family:'Share Tech Mono',monospace;
  font-size:10px;color:var(--dim);margin-bottom:8px;}
.outage-table{width:100%;border-collapse:collapse;font-size:12px;font-family:'Share Tech Mono',monospace;}
.outage-table th{color:var(--dim);font-weight:normal;padding:4px 8px;border-bottom:1px solid var(--border);
  text-align:left;}
.outage-table td{padding:5px 8px;border-bottom:1px solid #0d1520;color:var(--text);}
.outage-table tr:last-child td{border-bottom:none;}
.duration-warn{color:var(--orange);}
.duration-ok{color:var(--green);}
.no-outages{text-align:center;color:var(--dim);padding:16px;font-size:12px;}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#111827;border:1px solid var(--green);color:var(--green);
  font-family:'Share Tech Mono',monospace;font-size:12px;padding:10px 20px;
  border-radius:10px;opacity:0;transition:opacity .3s;pointer-events:none;
  box-shadow:0 0 20px #00ff8844;z-index:99;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<h1>🌿 МІЙ ДІМ</h1>

<div class="status-bar">
  <span><span class="dot" id="dot"></span><span id="connText">Підключення...</span></span>
  <span id="lastUpdate">--:--:--</span>
</div>

<!-- Датчики -->
<div class="card">
  <div class="card-title">📊 Показники</div>
  <div class="sensors">
    <div><div class="sv" id="sTemp">--</div><div class="sl">Темп. °C</div></div>
    <div><div class="sv" id="sHum">--</div><div class="sl">Волог. %</div></div>
    <div><div class="sv" id="sTime" style="font-size:16px;padding-top:6px">--:--</div><div class="sl">Час</div></div>
    <div>
      <div class="power-indicator on" id="powerIndicator">⚡ ON</div>
      <div class="sl">220В</div>
    </div>
  </div>
</div>

<!-- Реле -->
<div class="card">
  <div class="card-title">⚡ Реле</div>
  <div id="relayList"></div>
</div>

<!-- Параметри -->
<div class="card">
  <div class="card-title">⚙️ Параметри автоматики</div>
  <div class="form-row">
    <label>🌍 Часовий пояс</label>
    <div class="toggle-wrap">
      <span class="toggle-label winter">Зима UTC+2</span>
      <label class="toggle">
        <input type="checkbox" id="pSummer" onchange="onParamFocus()">
        <span class="toggle-slider"></span>
      </label>
      <span class="toggle-label summer">Літо UTC+3</span>
    </div>
  </div>
  <div class="form-row"><label>💡 Світло від (год)</label><input type="number" id="pLightOn" min="0" max="23" onfocus="onParamFocus()" onblur="onParamBlur()"></div>
  <div class="form-row"><label>🌙 Світло до (год)</label><input type="number" id="pLightOff" min="0" max="23" onfocus="onParamFocus()" onblur="onParamBlur()"></div>
  <div class="form-row"><label>💧 Мін. вологість % (зволож.)</label><input type="number" id="pHumMin" min="0" max="100" onfocus="onParamFocus()" onblur="onParamBlur()"></div>
  <div class="form-row"><label>🌡 Макс. температура °C (вент.)</label><input type="number" id="pFanT" min="0" max="60" step="0.5" onfocus="onParamFocus()" onblur="onParamBlur()"></div>
  <div class="form-row"><label>💨 Макс. вологість % (вент.)</label><input type="number" id="pFanH" min="0" max="100" onfocus="onParamFocus()" onblur="onParamBlur()"></div>
  <div class="form-row"><label>Вентилятор реагує на температуру</label><input type="checkbox" id="pFanByT" onchange="onParamFocus()"></div>
  <div class="form-row"><label>Вентилятор реагує на вологість</label><input type="checkbox" id="pFanByH" onchange="onParamFocus()"></div>
  <button class="save-btn" onclick="saveParams()">💾 ЗБЕРЕГТИ ПАРАМЕТРИ</button>
</div>

<!-- Графік відключень -->
<div class="card">
  <div class="card-title">📉 Відключення світла (24 год)</div>
  <div class="timeline-labels" id="timelineLabels"></div>
  <div class="timeline" id="timeline"></div>
  <div id="outageList"><div class="no-outages">Відключень не зафіксовано</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== MQTT =====
const BROKER         = "wss://9db95805f2e640a98a99663099434134.s1.eu.hivemq.cloud:8884/mqtt";
const MQTT_USER      = "esp32user";
const MQTT_PASS      = "Esp32pass123";
const TOPIC_STATE    = "chills/state";
const TOPIC_POWER    = "chills/power";
const TOPIC_CMD_LIGHT  = "chills/cmd/light";
const TOPIC_CMD_HUM    = "chills/cmd/hum";
const TOPIC_CMD_FAN    = "chills/cmd/fan";
const TOPIC_CMD_RES    = "chills/cmd/res";
const TOPIC_CMD_PARAMS = "chills/cmd/params";

const RELAYS = [
  { key:'light', topic:TOPIC_CMD_LIGHT, name:'💡 Світло'     },
  { key:'hum',   topic:TOPIC_CMD_HUM,   name:'💧 Зволожувач' },
  { key:'fan',   topic:TOPIC_CMD_FAN,   name:'🌀 Вентилятор' },
  { key:'res',   topic:TOPIC_CMD_RES,   name:'🔌 Резерв'     },
];

let state = {};
let client;

// ===== ВІДКЛЮЧЕННЯ — ЗБЕРІГАЄМО В ПАМ'ЯТІ =====
// Формат: [{start: timestamp, end: timestamp|null}]
let outages = JSON.parse(localStorage.getItem('chills_outages') || '[]');
let lastDataTime = Date.now();
let offlineDetected = false;

function saveOutages() {
  // Зберігаємо тільки останні 24 години
  const cutoff = Date.now() - 86400000;
  outages = outages.filter(o => (o.end || Date.now()) > cutoff);
  localStorage.setItem('chills_outages', JSON.stringify(outages));
}

function recordPowerOff(time) {
  // Якщо вже є відкрите відключення — не додаємо нове
  if (outages.length > 0 && outages[outages.length-1].end === null) return;
  outages.push({ start: time, end: null });
  saveOutages();
  renderOutages();
}

function recordPowerOn(time) {
  if (outages.length > 0 && outages[outages.length-1].end === null) {
    outages[outages.length-1].end = time;
    saveOutages();
    renderOutages();
  }
}

// Перевірка чи ESP32 мовчить (відключення світла)
setInterval(() => {
  const silentMs = Date.now() - lastDataTime;
  if (silentMs > 30000 && !offlineDetected) {
    offlineDetected = true;
    recordPowerOff(lastDataTime + 5000);
  }
  if (silentMs < 5000 && offlineDetected) {
    offlineDetected = false;
    recordPowerOn(Date.now());
  }
}, 5000);

// ===== ТАЙМЛАЙН =====
function renderTimeline() {
  const now = Date.now();
  const cutoff = now - 86400000;
  const timeline = document.getElementById('timeline');
  const labels = document.getElementById('timelineLabels');

  // Мітки часу
  let labelHtml = '';
  for (let i = 0; i <= 4; i++) {
    const t = new Date(cutoff + i * 21600000);
    labelHtml += `<span>${t.getHours().toString().padStart(2,'0')}:00</span>`;
  }
  labels.innerHTML = labelHtml;

  // Таймлайн
  timeline.innerHTML = '';

  // Спочатку зелений фон (все ок)
  const bg = document.createElement('div');
  bg.className = 'timeline-bar power-on';
  bg.style.left = '0';
  bg.style.width = '100%';
  timeline.appendChild(bg);

  // Поверх — червоні відрізки відключень
  const recent = outages.filter(o => (o.end || now) > cutoff);
  recent.forEach(o => {
    const start = Math.max(o.start, cutoff);
    const end   = Math.min(o.end || now, now);
    const left  = ((start - cutoff) / 86400000) * 100;
    const width = ((end - start) / 86400000) * 100;
    const bar = document.createElement('div');
    bar.className = 'timeline-bar power-off';
    bar.style.left  = left + '%';
    bar.style.width = Math.max(width, 0.3) + '%';
    timeline.appendChild(bar);
  });
}

function formatDuration(ms) {
  if (!ms) return '—';
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const h = Math.floor(m / 60);
  if (h > 0) return `${h}г ${m%60}хв`;
  if (m > 0) return `${m}хв ${s%60}с`;
  return `${s}с`;
}

function renderOutages() {
  renderTimeline();
  const cutoff = Date.now() - 86400000;
  const recent = outages.filter(o => (o.end || Date.now()) > cutoff)
                        .slice().reverse();

  if (recent.length === 0) {
    document.getElementById('outageList').innerHTML =
      '<div class="no-outages">✅ Відключень за останні 24 год не зафіксовано</div>';
    return;
  }

  let html = `<table class="outage-table">
    <tr><th>Початок</th><th>Кінець</th><th>Тривалість</th></tr>`;
  recent.forEach(o => {
    const start = new Date(o.start).toLocaleTimeString('uk-UA', {hour:'2-digit',minute:'2-digit'});
    const end   = o.end ? new Date(o.end).toLocaleTimeString('uk-UA', {hour:'2-digit',minute:'2-digit'}) : '⏳ зараз';
    const dur   = o.end ? formatDuration(o.end - o.start) : formatDuration(Date.now() - o.start);
    const durMs = o.end ? o.end - o.start : Date.now() - o.start;
    const cls   = durMs > 3600000 ? 'duration-warn' : 'duration-ok';
    html += `<tr><td>${start}</td><td>${end}</td><td class="${cls}">${dur}</td></tr>`;
  });
  html += '</table>';
  document.getElementById('outageList').innerHTML = html;
}

// Оновлюємо таймлайн кожну хвилину
setInterval(renderOutages, 60000);
renderOutages();

// ===== UI =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

let userEditing = false;
let editingTimer = null;
function onParamFocus() { userEditing = true; clearTimeout(editingTimer); }
function onParamBlur()  { editingTimer = setTimeout(() => { userEditing = false; }, 10000); }

function renderRelays() {
  const list = document.getElementById('relayList');
  if (!state.relays) return;
  list.innerHTML = RELAYS.map(r => {
    const on   = state.relays?.[r.key] ?? false;
    const auto = state.modes?.[r.key]  ?? true;
    return `<div class="relay-row">
      <div class="relay-left">
        <span class="relay-name">${r.name}</span>
        <span class="relay-state ${on?'on':'off'}">${on?'ON':'OFF'}</span>
      </div>
      <div class="relay-controls">
        <span class="badge ${auto?'auto':'manual'}" onclick="toggleMode('${r.key}','${r.topic}',${auto})">${auto?'АВТО':'РУЧ'}</span>
        ${!auto ? `
          <button class="btn on-btn"  onclick="sendCmd('${r.topic}','ON')">УВІМК</button>
          <button class="btn off-btn" onclick="sendCmd('${r.topic}','OFF')">ВИМК</button>
        ` : ''}
      </div>
    </div>`;
  }).join('');
}

function fillParams() {
  if (userEditing) return;
  const p = state.params || {};
  document.getElementById('pSummer').checked  = state.summer  ?? true;
  document.getElementById('pLightOn').value   = p.lightOn  ?? 6;
  document.getElementById('pLightOff').value  = p.lightOff ?? 22;
  document.getElementById('pHumMin').value    = p.humMin   ?? 60;
  document.getElementById('pFanT').value      = p.fanT     ?? 25;
  document.getElementById('pFanH').value      = p.fanH     ?? 70;
  document.getElementById('pFanByT').checked  = p.fanByT   ?? true;
  document.getElementById('pFanByH').checked  = p.fanByH   ?? true;
}

function updateSensors() {
  document.getElementById('sTemp').textContent = state.temp?.toFixed(1) ?? '--';
  document.getElementById('sHum').textContent  = state.hum?.toFixed(1)  ?? '--';
  document.getElementById('sTime').textContent = state.time?.substring(0,5) ?? '--';
  document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('uk-UA');

  // Індикатор живлення
  const ind = document.getElementById('powerIndicator');
  if (state.power === false) {  // false від ESP32 = є 220В
    ind.textContent = '⚡ ON';
    ind.className = 'power-indicator on';
  } else if (state.power === true) {  // true від ESP32 = немає 220В
    ind.textContent = '❌ OFF';
    ind.className = 'power-indicator off';
  }
}

function sendCmd(topic, cmd) {
  if (!client?.connected) return;
  client.publish(topic, cmd);
  showToast('✅ ' + cmd);
}

function toggleMode(key, topic, isAuto) {
  sendCmd(topic, isAuto ? 'OFF' : 'AUTO');
  showToast(isAuto ? '🔧 Ручний: ' + key : '🤖 Авто: ' + key);
}

function saveParams() {
  if (!client?.connected) { showToast('❌ Немає підключення!'); return; }
  const params = {
    summer:   document.getElementById('pSummer').checked,
    lightOn:  parseInt(document.getElementById('pLightOn').value),
    lightOff: parseInt(document.getElementById('pLightOff').value),
    humMin:   parseFloat(document.getElementById('pHumMin').value),
    fanT:     parseFloat(document.getElementById('pFanT').value),
    fanH:     parseFloat(document.getElementById('pFanH').value),
    fanByT:   document.getElementById('pFanByT').checked,
    fanByH:   document.getElementById('pFanByH').checked,
  };
  client.publish(TOPIC_CMD_PARAMS, JSON.stringify(params));
  userEditing = false;
  showToast('💾 Параметри збережено!');
}

// ===== MQTT =====
client = mqtt.connect(BROKER, {
  username: MQTT_USER,
  password: MQTT_PASS,
  clientId: 'ChillsWeb_' + Math.random().toString(16).slice(2,8)
});

client.on('connect', () => {
  document.getElementById('dot').classList.add('ok');
  document.getElementById('connText').textContent = 'Підключено';
  client.subscribe(TOPIC_STATE);
  client.subscribe(TOPIC_POWER);
  client.subscribe('chills/temperature');
  client.subscribe('chills/humidity');
  client.subscribe('chills/time');
  showToast('✅ Підключено до MQTT');
});

client.on('message', (topic, payload) => {
  const msg = payload.toString();
  lastDataTime = Date.now();

  if (topic === TOPIC_STATE) {
    try {
      state = JSON.parse(msg);
      updateSensors();
      renderRelays();
      fillParams();
    } catch(e) { console.error(e); }
    return;
  }

  if (topic === TOPIC_POWER) {
    if (msg === 'ON')  recordPowerOff(Date.now()); // ON від ESP32 = немає 220В (інвертовано)
    if (msg === 'OFF') recordPowerOn(Date.now());  // OFF від ESP32 = є 220В (інвертовано)
    return;
  }

  if (topic === 'chills/temperature') {
    document.getElementById('sTemp').textContent = parseFloat(msg).toFixed(1);
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('uk-UA');
  }
  if (topic === 'chills/humidity') {
    document.getElementById('sHum').textContent = parseFloat(msg).toFixed(1);
  }
  if (topic === 'chills/time') {
    document.getElementById('sTime').textContent = msg.substring(0,5);
  }
});

client.on('error', (err) => {
  document.getElementById('connText').textContent = 'Помилка';
  showToast('❌ ' + err.message);
});

client.on('offline', () => {
  document.getElementById('dot').classList.remove('ok');
  document.getElementById('connText').textContent = "З'єднання втрачено";
});
</script>
</body>
</html>
